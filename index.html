<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR Viewer</title>
    <link rel="stylesheet" href="styles.css">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <!-- Supabase JS client (read-only on the browser) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <img src="logo.png" alt="Logo" class="logo">
            <h1>WebAR Viewer</h1>
        </header>
        <main>
            <model-viewer id="model" alt="A 3D model" ar ar-modes="scene-viewer webxr quick-look" camera-controls auto-rotate autoplay></model-viewer>
            <div class="upload-container">
                <label for="glbUpload">Upload GLB Model:</label>
                <input type="file" id="glbUpload" accept=".glb, .gltf"/>
            </div>
            <p class="hint">Upload GLB untuk langsung membuat link share. Jika converter aktif, USDZ beranimasi dibuat otomatis untuk AR di iOS.</p>

            <p id="status" class="status"></p>

            <div id="shareResult" class="share-result" hidden>
                <label for="shareLink">Shareable link:</label>
                <div class="share-row">
                    <input type="text" id="shareLink" readonly />
                    <button id="copyBtn" class="copy-btn">Copy</button>
                </div>
            </div>
        </main>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
